# ============================================================
# AUDITIT BY PWC ? APPLICATION PROPERTIES
# ============================================================

spring.application.name=auditit

# ---- Server ----
server.port=8080
server.servlet.context-path=/api

# ---- Database ----
# Local startup should not depend on Atlas SRV/TXT DNS lookups. Set MONGODB_URI
# explicitly when you want to use Atlas or another remote MongoDB deployment.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/auditit}
spring.data.mongodb.auto-index-creation=true

# ---- Spring Bean Definition ----
spring.main.allow-bean-definition-overriding=true

# ---- JWT ----
jwt.secret=${JWT_SECRET:change-me-dev-only}
jwt.expiration=86400000

# ---- Microsoft Entra ID Configuration ----
auth.entra.client-id=${AUTH_ENTRA_CLIENT_ID:137fdffc-4f3f-4d4d-a3ef-25cab976ef4c}
auth.entra.client-secret=${AUTH_ENTRA_CLIENT_SECRET:}
auth.entra.redirect-uri=${AUTH_ENTRA_REDIRECT_URI:http://localhost:8080/api/auth/callback}
auth.entra.frontend-callback-uri=${AUTH_ENTRA_FRONTEND_CALLBACK_URI:http://localhost:5173/auth/callback}
auth.entra.post-logout-redirect-uri=${AUTH_ENTRA_POST_LOGOUT_REDIRECT_URI:http://localhost:5173}
auth.entra.metadata-url=${AUTH_ENTRA_METADATA_URL:https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration}

# ---- Microsoft Graph / OneDrive Import Configuration ----
graph.tenant-id=${GRAPH_TENANT_ID:889cdbee-d881-42dc-bd06-ad3237c34a53}
graph.client-id=${GRAPH_CLIENT_ID:137fdffc-4f3f-4d4d-a3ef-25cab976ef4c}
graph.client-secret=${GRAPH_CLIENT_SECRET:}
graph.base-url=${GRAPH_BASE_URL:https://graph.microsoft.com/v1.0}
graph.delegated-scopes=${GRAPH_DELEGATED_SCOPES:User.Read Files.Read offline_access}
graph.redirect-uri=${GRAPH_REDIRECT_URI:http://localhost:8080/api/graph/oauth/callback}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ---- CORS ----
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ---- Email ----
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:Wouhouchteam@gmail.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.from-name=${MAIL_FROM_NAME:AuditIT}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:10000}
spring.mail.properties.mail.debug=${SMTP_DEBUG:false}

# ---- OpenAPI / Swagger ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Enable security configuration
security.enabled=true

# ---- Logging ----
logging.level.root=INFO
logging.level.com.pwc.auditit=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ---- FastAPI Configuration ----
fastapi.base-url=${FASTAPI_BASE_URL:http://localhost:8000}
fastapi.internal-api-key=${FASTAPI_INTERNAL_API_KEY:}
fastapi.cdw-report-endpoint=${FASTAPI_CDW_REPORT_ENDPOINT:/agents/cdw-report}
fastapi.cdw-ppt-report-endpoint=${FASTAPI_CDW_PPT_REPORT_ENDPOINT:/agents/cdw-ppt-report}
fastapi.chatbot-endpoint=${FASTAPI_CHATBOT_ENDPOINT:/agents/chatbot}
fastapi.generated-report-blob-ingestion-endpoint=${FASTAPI_GENERATED_REPORT_BLOB_INGESTION_ENDPOINT:/ingestion/generated-reports/blob}
fastapi.generated-reports-blob-prefix-ingestion-endpoint=${FASTAPI_GENERATED_REPORTS_BLOB_PREFIX_INGESTION_ENDPOINT:/ingestion/generated-reports/blob-prefix}
fastapi.platform-docs-jsonl-ingestion-endpoint=${FASTAPI_PLATFORM_DOCS_JSONL_INGESTION_ENDPOINT:/ingestion/platform-docs/jsonl}
fastapi.platform-docs-status-endpoint=${FASTAPI_PLATFORM_DOCS_STATUS_ENDPOINT:/ingestion/platform-docs/status}
fastapi.connect-timeout-ms=${FASTAPI_CONNECT_TIMEOUT_MS:30000}
fastapi.read-timeout-ms=${FASTAPI_READ_TIMEOUT_MS:900000}
fastapi.max-in-memory-size-bytes=${FASTAPI_MAX_IN_MEMORY_SIZE_BYTES:104857600}

# ---- Document Search / RAG Configuration ----
document-search.azure-search.endpoint=${AZURE_SEARCH_ENDPOINT:https://auditseaarch.search.windows.net}
document-search.azure-search.index-name=${AZURE_SEARCH_INDEX_NAME:audit-platform-guide-index}
document-search.platform-chunks.path=${RAG_CHUNKS_PATH:docs/rag-output/rag_chunks.jsonl}
document-search.platform-chunks.batch-size=${RAG_CHUNKS_BATCH_SIZE:50}
document-search.generated-reports.blob-prefix=${AZURE_BLOB_REPORTS_PREFIX:missions/}
document-search.generated-reports.max-files=${RAG_REPORTS_MAX_FILES:50}

# ---- Azure Blob Storage Configuration ----
azure.blob-storage.connection-string=${AZURE_BLOB_STORAGE_CONNECTION_STRING:}
azure.blob-storage.container-name=${AZURE_BLOB_CONTAINER_NAME:auditit-files}
azure.blob-storage.reports-path=${AZURE_BLOB_REPORTS_PATH:projects/{projectId}/reports}

